spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ai_career_navigator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:YOUR_NAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YOUR_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${PORT:8080}

gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
groq.api.key=${GROQ_API_KEY:YOUR_GROQ_API_KEY}